<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WeChat Clone</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
      <div class="auth-container">
        <h1 class="logo">WeChat</h1>
        <div class="auth-tabs">
          <button class="tab active" data-tab="login">登录</button>
          <button class="tab" data-tab="register">注册</button>
        </div>
        <form id="login-form" class="auth-form">
          <input type="text" id="login-phone" placeholder="手机号" required>
          <input type="password" id="login-password" placeholder="密码" required>
          <button type="submit" class="btn-primary">登录</button>
        </form>
        <form id="register-form" class="auth-form hidden">
          <input type="text" id="reg-phone" placeholder="手机号" required>
          <input type="password" id="reg-password" placeholder="密码 (至少6位)" required>
          <input type="text" id="reg-nickname" placeholder="昵称">
          <button type="submit" class="btn-primary">注册</button>
        </form>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen hidden">
      <!-- Chat List -->
      <div id="chat-list" class="tab-content active">
        <header class="header">
          <h2>微信</h2>
          <button class="icon-btn" onclick="showAddChat()">+</button>
        </header>
        <div id="conversations" class="list"></div>
      </div>

      <!-- Contacts -->
      <div id="contacts" class="tab-content">
        <header class="header">
          <h2>通讯录</h2>
          <button class="icon-btn" onclick="showSearchUser()">+</button>
        </header>
        <div id="friends-list" class="list"></div>
      </div>

      <!-- Moments -->
      <div id="moments-tab" class="tab-content">
        <header class="header">
          <h2>朋友圈</h2>
          <button class="icon-btn" onclick="showPostMoment()">📷</button>
        </header>
        <div id="moments-list" class="list"></div>
      </div>

      <!-- Profile -->
      <div id="profile" class="tab-content">
        <header class="header"><h2>我</h2></header>
        <div class="profile-card" id="profile-card"></div>
        <button class="btn-logout" onclick="logout()">退出登录</button>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-tab="chat-list">💬 微信</button>
        <button class="nav-item" data-tab="contacts">👥 通讯录</button>
        <button class="nav-item" data-tab="moments-tab">🌟 朋友圈</button>
        <button class="nav-item" data-tab="profile">👤 我</button>
      </nav>
    </div>

    <!-- Chat Window -->
    <div id="chat-window" class="screen hidden">
      <header class="header chat-header">
        <button class="back-btn" onclick="closeChat()">←</button>
        <h2 id="chat-title">聊天</h2>
      </header>
      <div id="messages" class="messages"></div>
      <div class="input-bar">
        <input type="text" id="msg-input" placeholder="输入消息...">
        <button class="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </div>

    <!-- Modals -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <div id="modal-body"></div>
        <button class="btn-close" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
